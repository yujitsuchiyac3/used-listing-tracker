name: daily-listing-mail

# 1日1回(JST 8:00 = UTC 23:00)実行。手動実行も可。
on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "送信せずHTML出力のみ"
        type: boolean
        default: false

permissions:
  contents: write   # スナップショット/アーカイブのコミットに必要

concurrency:
  group: daily-listing-mail
  cancel-in-progress: false

jobs:
  crawl-and-mail:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run crawler and send mail
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python3 main.py --dry-run
          else
            python3 main.py
          fi

      - name: Commit snapshot and archive
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/state.json data/latest_email.html data/archive || true
          if git diff --cached --quiet; then
            echo "変更なし"
          else
            git commit -m "chore: update snapshot and email archive ($(date -u +%Y-%m-%d))"
            git push
          fi
